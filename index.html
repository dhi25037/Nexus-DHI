<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Awesome Space</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Pretendard', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            line-height: 1.6;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            background: var(--card);
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            margin-bottom: 1rem;
        }

        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        p { color: #94a3b8; margin-bottom: 2rem; }

        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-item {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .link-item:hover {
            background: var(--accent);
            color: var(--bg);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://via.placeholder.com/150" alt="Profile" class="profile-img">
        <h1>안녕하세요, 홍길동입니다 👋</h1>
        <p>코드로 세상을 그리는 프론트엔드 개발자입니다.</p>
        
        <div class="links">
            <a href="https://github.com/본인아이디" class="link-item">GitHub</a>
            <a href="https://blog.naver.com" class="link-item">Blog</a>
            <a href="mailto:email@example.com" class="link-item">Contact Me</a>
        </div>
    </div>
</body>
</html>
